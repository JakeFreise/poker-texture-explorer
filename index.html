<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>blob.ink</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #edf3f6;
      background: #0b1014;
    }
    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 20% 0%, rgba(119, 200, 193, 0.18), transparent 28rem),
        linear-gradient(180deg, #0d1419 0%, #0b1014 100%);
    }
    main {
      display: grid;
      gap: 14px;
      width: min(520px, calc(100vw - 32px));
    }
    h1 {
      margin: 0;
      font-size: 28px;
      font-weight: 750;
    }
    p {
      margin: 0;
      color: #92a0aa;
      line-height: 1.45;
    }
    a {
      width: fit-content;
      padding: 10px 14px;
      border: 1px solid rgba(119, 200, 193, 0.42);
      border-radius: 6px;
      color: #edf3f6;
      background: rgba(119, 200, 193, 0.14);
      text-decoration: none;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main>
    <h1>Flop Explorer</h1>
    <p>Explore poker flop textures, range composition, and future hand-frequency pressure.</p>
    <a href="/flop-explorer/">Open Flop Explorer</a>
  </main>
</body>
</html>
